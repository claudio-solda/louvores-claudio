<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Meus Louvores</title>
<style>
  *{box-sizing:border-box;}
  body{
    margin:0;
    font-family:'Segoe UI', Arial, sans-serif;
    background:linear-gradient(180deg,#f4f8fb 0%,#e8f2fa 100%);
    color:#1a2b3c;
    min-height:100vh;
  }
  header{
    background:#1e5f8c;
    color:#fff;
    padding:26px 16px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,.15);
  }
  h1{margin:0;font-size:clamp(24px,6vw,32px);}
  .sub{font-size:13px;color:#dcebf7;margin-top:6px;}
  main{max-width:600px;margin:0 auto;padding:24px 18px;}
  .card{
    display:block;
    background:#fff;
    border-radius:12px;
    padding:18px 20px;
    margin-bottom:14px;
    text-decoration:none;
    color:#1a2b3c;
    box-shadow:0 2px 6px rgba(0,0,0,.07);
    border-left:5px solid #1e5f8c;
  }
  .card:active{opacity:.75;}
  .card .titulo{font-size:19px;font-weight:600;}
  .card .igreja{font-size:13px;color:#7a8fa3;margin-top:3px;}
  .rodape{text-align:center;font-size:12px;color:#7a8fa3;margin-top:30px;}
</style>
</head>
<body>
<header>
  <h1>🎵 Meus Louvores</h1>
  <div class="sub">IJEFONT</div>
</header>
<main>
  <a class="card" href="divino-companheiro.html">
    <div class="titulo">Divino Companheiro</div>
    <div class="igreja">Toque para ver a letra</div>
  </a>

  <div class="rodape">© Irmão Claudio</div>
</main>
</body>
</html>
